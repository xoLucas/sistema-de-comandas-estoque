{% extends "base.html" %}
{% block content %}
<header class="table-header">
    <a href="/" class="back-btn">&larr; Mesas</a>
    <div style="min-width:0;">
        <h1 id="table-title">MESA</h1>
        <p id="table-status" class="subtitle">Carregando...</p>
    </div>
</header>

<div id="customer-section" style="display:none;margin-bottom:12px;">
    <div class="form-row">
        <input type="text" id="customer-name-input" placeholder="Nome do cliente (opcional)" class="input-field">
        <button onclick="setCustomerName()" class="btn-small">OK</button>
    </div>
</div>

<div class="order-total" id="order-total">
    <span>Total</span>
    <span id="total-value">R$ 0,00</span>
    <div id="partial-info" style="display:none;">
        <span class="partial-label">Pago </span>
        <span id="partial-value">R$ 0,00</span>
        <span id="partial-detail" style="font-size:11px;color:var(--text-muted);display:block;margin-top:2px;"></span>
    </div>
</div>

<div id="open-actions" style="display:none;">
    <button onclick="openOrder()" class="btn-open-full">Abrir Comanda</button>
</div>

<div id="active-actions" style="display:none;">
    <div id="pedidos-section"></div>

    <button onclick="showAddPedidoModal()" class="btn-pedido-full">+ Novo Pedido</button>

    <div class="actions-stack" id="close-actions">
        <button onclick="showPartialPaymentModal()" class="btn-partial-full">
            &#128176; Pagamento Parcial
        </button>
        <button onclick="showCloseModal()" class="btn-close-full">Fechar Mesa</button>
    </div>
</div>

<div id="add-pedido-modal" class="modal" style="display:none;">
    <div class="modal-content modal-large" id="pedido-modal-content"></div>
</div>

<div id="partial-payment-modal" class="modal" style="display:none;">
    <div class="modal-content modal-large">
        <h3>Pagamento Parcial</h3>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
            Selecione os itens que o cliente deseja pagar agora.
        </p>
        <div id="partial-payment-items" class="partial-payment-list"></div>
        <div class="partial-summary" id="partial-summary">
            <span>Selecionado:</span>
            <span id="partial-selected-total">R$ 0,00</span>
        </div>
        <div style="margin-top:10px;">
            <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;">
                <input type="checkbox" id="partial-service-charge" onchange="updatePartialTotal()" style="width:18px;height:18px;accent-color:var(--accent);">
                Acrescentar 10% de serviço
            </label>
        </div>
        <div style="margin-top:10px;">
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Forma de Pagamento</label>
            <select id="partial-payment-method" class="select-field">
                <option value="dinheiro">Dinheiro</option>
                <option value="cartao_credito">Cartão de Crédito</option>
                <option value="cartao_debito">Cartão de Débito</option>
                <option value="pix">Pix</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button onclick="submitPartialPayment()" class="btn-primary-full" style="flex:1;">Confirmar Pagamento</button>
            <button onclick="closePartialPaymentModal()" class="btn-secondary-full" style="flex:1;">Cancelar</button>
        </div>
        <p id="partial-payment-error" class="error-msg" style="display:none;"></p>
    </div>
</div>

<div id="close-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Fechar Mesa</h3>
        <div id="close-summary" style="margin-bottom:14px;"></div>
        <div style="margin-bottom:10px;">
            <label style="display:flex;align-items:center;gap:10px;font-size:15px;cursor:pointer;">
                <input type="checkbox" id="apply-service-charge" onchange="updateCloseTotal()" style="width:18px;height:18px;accent-color:var(--accent);">
                Acrescentar 10% de serviço
            </label>
        </div>
        <div style="margin-bottom:14px;">
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Forma de Pagamento</label>
            <select id="close-payment-method" class="select-field">
                <option value="dinheiro">Dinheiro</option>
                <option value="cartao_credito">Cartão de Crédito</option>
                <option value="cartao_debito">Cartão de Débito</option>
                <option value="pix">Pix</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;">
            <button onclick="confirmClose()" class="btn-primary-full" style="flex:1;">Confirmar Fechamento</button>
            <button onclick="closeCloseModal()" class="btn-secondary-full" style="flex:1;">Cancelar</button>
        </div>
        <p id="close-error" class="error-msg" style="display:none;"></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const TABLE_ID = {{ table_id }};
document.addEventListener('DOMContentLoaded', () => {
    checkAuth((user) => {
        document.getElementById('bottom-nav').style.display = 'flex';
        loadTableDetail(user);
    });
});
</script>
{% endblock %}
